services:
  nginx:
    image: nginx:stable
    container_name: ecopad-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - portal
    restart: unless-stopped

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: ecopad-portal
    environment:
      RUNNER_SERVICE_URL: http://runner:8001
      PORTAL_DB_PATH: /data/portal.db
    volumes:
      - ./portal/data:/data
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
    depends_on:
      - runner
    expose:
      - "8000"
    restart: unless-stopped

  runner:
    build:
      context: ./runner
      dockerfile: Dockerfile
    container_name: ecopad-runner
    environment:
      RUNNER_DB_PATH: /app/db/runner.db
      SITES_CONFIG_PATH: /app/config/sites.json
      SITE_REQUEST_TIMEOUT: "120"
    volumes:
      - ./runner/config:/app/config
      - ./runner/db:/app/db
      - ./runner/runtime:/app/runtime
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8001
    expose:
      - "8001"
    restart: unless-stopped

  site-template:
    build:
      context: ./sites/site-template
      dockerfile: Dockerfile
    container_name: ecopad-site-template
    environment:
      SITE_CONFIG_PATH: /app/config/site.json
    volumes:
      - ./sites/site-template/config:/app/config
      - ./sites/site-template/workspace:/app/workspace
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8011
    expose:
      - "8011"
    restart: unless-stopped

  site-spruce:
    build:
      context: ./sites/site-SPRUCE
      dockerfile: Dockerfile
    container_name: ecopad-site-spruce
    environment:
      SITE_CONFIG_PATH: /app/config/site.json
    volumes:
      - ./sites/site-SPRUCE/config:/app/config
      - ./sites/site-SPRUCE/workspace:/app/workspace
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8012
    expose:
      - "8012"
    restart: unless-stopped